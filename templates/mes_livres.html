<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mes livres publiés</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style1.css') }}">
</head>
<body>
  {% include 'header.html' %}
  <div class="page-container">

    <div class="books-container">
        {% for book in books %}
          <div class="book-card">
                <img src="{{ book['image_url'] }}" alt="Image livre" class="book-image">
                <h3>{{ book['title'] }}</h3>
                <p><strong>Auteur :</strong> {{ book['author'] }}</p>
                <p><strong>Catégorie :</strong> {{ book['category'] }}</p>
                <p><strong>État :</strong> {{ book['condition'] }}</p>
                <p><strong>Prix :</strong> {{ book['price'] }} €</p>
                <p><strong>Statut :</strong> {{ book['status'] }}</p>
                <p><strong>Action :</strong> {{ book['action'] }}</p> 
          

        
                <div class="card-buttons">
                    <a href="{{ url_for('edit_book_get', book_id=book['id']) }}" class="btn-edit">Modifier</a>
                    <a href="{{ url_for('delete_book', book_id=book['id']) }}" class="btn-delete"> Supprimer</a>
                </div>
          </div>
       {% endfor %}
    </div>
      
      

</body>
</html>
