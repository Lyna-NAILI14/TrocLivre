<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier mes informations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style1.css') }}">
</head>
<body>
    {% include 'header.html' %}

    <div class="form-container">
        <h2>Modifier mes informations</h2>
        <form method="POST" action="{{ url_for('edit_profile') }}">
            <input type="text" name="name" placeholder="Nom" value="{{ user[0] }}" required>
            <input type="email" name="email" placeholder="Email" value="{{ user[1] }}" required>
            <input type="text" name="city" placeholder="Ville" value="{{ user[3] }}" required>
            <input type="password" name="password" placeholder="Nouveau mot de passe">
            <button type="submit">Mettre à jour</button>
        </form>
        <a href="{{ url_for('profile') }}" class="back-link">← Retour au profil</a>
    </div>
</body>
</html>
